<script>
    const TOKEN = "patxXCh49k5hv8bZH"; 
    const BASE_ID = "app101Rd6gKDfb4WT";
    const lang = localStorage.getItem('selectedLanguage') || 'fr';
    
    const ui = {
        fr: { t: "Immobilier Industriel", u: "DZD", b: "← Retour", s: "Superficie", z: "Zonage", e: "État" },
        en: { t: "Industrial Real Estate", u: "DZD", b: "← Back", s: "Area", z: "Zoning", e: "Condition" },
        ar: { t: "العقارات الصناعية", u: "د.ج", b: "رجوع →", s: "المساحة", z: "المنطقة", e: "الحالة" }
    }[lang];

    document.getElementById('page-title').innerText = ui.t;
    document.getElementById('btn-back').innerText = ui.b;
    if(ui.r) document.body.style.direction = 'rtl';

    fetch(`https://api.airtable.com/v0/${BASE_ID}/Industriel`, {
        headers: { Authorization: `Bearer ${TOKEN}` }
    })
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('container');
        
        container.innerHTML = data.records.map(r => `
            <div class="card bg-[#050505] p-6 border border-[#1a1a1a] hover:border-[#d4af37] transition-all">
                ${r.fields.Photos ? `<img src="${r.fields.Photos[0].url}" class="w-full h-64 object-cover mb-6 grayscale hover:grayscale-0 transition-all">` : ''}
                
                <h3 class="text-[11px] uppercase tracking-[3px] mb-2 font-light text-gray-400">${r.fields.Ville || 'Algérie'}</h3>
                
                <p class="text-[#d4af37] text-[16px] font-medium mb-6">
                    ${r.fields.Prix ? new Intl.NumberFormat().format(r.fields.Prix) : 'Sur devis'} ${ui.u}
                </p>
                
                <div class="space-y-2 border-t border-[#1a1a1a] pt-4 text-[10px] uppercase tracking-[1px] font-light">
                    <div class="flex justify-between">
                        <span class="opacity-50">${ui.s}:</span>
                        <span>${r.fields.Superficie || '-'} m²</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="opacity-50">${ui.z}:</span>
                        <span>${r.fields.Zonage || '-'}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="opacity-50">${ui.e}:</span>
                        <span>${r.fields["État du bâtiment"] || '-'}</span>
                    </div>
                </div>
            </div>
        `).join('');
    })
    .catch(err => console.error("Erreur:", err));
</script>
