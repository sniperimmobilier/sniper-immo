<!DOCTYPE html><html lang="fr"><head><meta charset='UTF-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root { --gold: linear-gradient(135deg, #d4af37 0%, #f2d472 50%, #b8860b 100%); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Helvetica', sans-serif; line-height: 1.2; }
    
    /* HEADER SANS VIDE */
    .header-xl { 
        background: #000; height: 130px; display: flex; align-items: center; 
        padding: 0 20px; border-bottom: 2px solid #d4af37; width: 100%;
    }
    .s-logo { background: var(--gold); color: #000; padding: 10px 20px; font-weight: 900; font-size: 32px; border-radius: 5px; margin-right: 15px; }
    .logo-txt { font-size: 22px; font-weight: bold; line-height: 1.1; }
    .logo-txt span { background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 13px; letter-spacing: 3px; }
    
    .live-indicator { margin-left: auto; text-align: center; }
    .dot { width: 12px; height: 12px; background: #2ecc71; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 10px #2ecc71; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    /* SECTION JURIDIQUE SERRÉE */
    .juridique-frame {
        margin: 15px 20px;
        padding: 20px;
        border: 2px solid #d4af37;
        background: rgba(212, 175, 55, 0.03);
        text-align: center;
        border-radius: 10px;
    }
    .juridique-frame h1 { 
        background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        font-size: 1.4rem; text-transform: uppercase; margin-bottom: 8px; font-weight: 900; 
    }
    .juridique-frame p { color: #ccc; font-size: 0.9rem; font-weight: 300; }

    /* MENU COMPACT */
    .menu { padding: 0 20px 25px 20px; display: flex; flex-direction: column; gap: 10px; }
    .btn { 
        display: flex; align-items: center; justify-content: space-between;
        background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
        color: #fff; padding: 20px; text-decoration: none; border-radius: 10px; 
        font-weight: bold; text-transform: uppercase; font-size: 0.9rem;
    }
    .btn i { color: #d4af37; font-size: 1.2rem; }
    .gold-btn { background: var(--gold); color: #000; border: none; }
    .gold-btn span, .gold-btn i { color: #000; font-weight: 900; }

    .footer { padding: 20px; text-align: center; color: #333; font-size: 9px; letter-spacing: 3px; }
    </style></head><body>

    <div class="header-xl">
        <div class="s-logo">S</div>
        <div class="logo-txt">SNIPER<br><span>IMMOBILIER</span></div>
        <div class="live-indicator">
            <div class="dot"></div>
            <span style="color:#2ecc71; font-size:8px; font-weight:bold; display:block; margin-top:4px;">LIVE</span>
        </div>
    </div>

    <div class="juridique-frame">
        <h1>SÉCURITÉ JURIDIQUE</h1>
        <p>Expertise foncière et notariale en Algérie. Investissez avec certitude.</p>
    </div>

    <div class="menu">
        <a href="https://www.lkeria.com/vente-immobilier-professionnel" class="btn">
            <span>Immobilier Industriel</span><i class="fas fa-industry"></i>
        </a>
        <a href="https://www.lkeria.com/vente-villa" class="btn">
            <span>Villas de Luxe</span><i class="fas fa-gem"></i>
        </a>
        <a href="https://www.lkeria.com/vente-encheres-immobilier" class="btn">
            <span>Ventes aux Enchères</span><i class="fas fa-gavel"></i>
        </a>
        <a href="https://wa.me/33634089609" class="btn">
            <span>Visite Virtuelle Live</span><i class="fas fa-video"></i>
        </a>
        <a href="https://wa.me/33634089609" class="btn gold-btn">
            <span>Paiement Frais de Dossier</span><i class="fas fa-credit-card"></i>
        </a>
    </div>

    <div class="footer">SNIPER IMMOBILIER • PRESTIGE</div>
    </body></html>
