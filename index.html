<!DOCTYPE html><html lang="fr"><head><meta charset='UTF-8'><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root {
        --gold: linear-gradient(135deg, #d4af37 0%, #f2d472 50%, #b8860b 100%);
        --dark-bg: #050505;
    }
    body { background: var(--dark-bg); color: #fff; font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    
    /* Header XL avec Reflets */
    .header-xl { 
        background: linear-gradient(to bottom, #111, #000); 
        height: 150px; display: flex; align-items: center; 
        padding: 0 20px; border-bottom: 2px solid #d4af37; position: relative;
        box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15);
    }
    .s-logo { 
        background: var(--gold); color: #000; padding: 12px 22px; 
        font-weight: 900; font-size: 38px; border-radius: 8px; margin-right: 15px;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    .sniper-text { font-size: 24px; font-weight: 800; line-height: 1; letter-spacing: 1px; }
    .sniper-text span { background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 14px; letter-spacing: 4px; font-weight: bold; }
    
    /* Section Juridique Stylisée */
    .section-juridique { 
        padding: 50px 25px; 
        background: radial-gradient(circle at center, #111 0%, #000 100%);
        text-align: center; border-bottom: 1px solid #222;
    }
    .section-juridique h1 { 
        background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        font-size: 1.8rem; text-transform: uppercase; margin-bottom: 15px; font-weight: 900;
    }
    .section-juridique p { color: #999; font-size: 1rem; line-height: 1.6; font-style: italic; }

    /* Menu Grid avec Effet Glass */
    .menu-grid { padding: 30px 20px; display: flex; flex-direction: column; gap: 20px; }
    .btn-action { 
        display: flex; align-items: center; justify-content: space-between;
        background: rgba(255, 255, 255, 0.03); 
        border: 1px solid rgba(212, 175, 55, 0.3); 
        color: #fff; padding: 28px 25px; text-decoration: none; border-radius: 12px;
        font-weight: 700; font-size: 1.1rem; text-transform: uppercase;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        transition: all 0.3s ease;
    }
    .btn-action:active { transform: scale(0.98); border-color: #d4af37; background: rgba(212, 175, 55, 0.05); }
    .btn-action i { color: #d4af37; font-size: 1.6rem; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
    
    /* Bouton Or Plein */
    .btn-gold { 
        background: var(--gold); color: #000; border: none; 
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }
    .btn-gold span { color: #000; font-weight: 900; }
    .btn-gold i { color: #000; text-shadow: none; }

    .footer-sniper { padding: 50px; text-align: center; color: #444; font-size: 11px; letter-spacing: 5px; text-transform: uppercase; }
    
    /* Animation du point live */
    .live-dot { width: 12px; height: 12px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 15px #2ecc71; position: relative; margin: 0 auto; }
    .live-dot::after { content: ''; width: 24px; height: 24px; border: 2px solid #2ecc71; border-radius: 50%; position: absolute; top: -7px; left: -7px; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style></head><body>

    <div class="header-xl">
        <div style="display:flex; align-items:center;">
            <div class="s-logo">S</div>
            <div class="sniper-text">SNIPER<br><span>IMMOBILIER</span></div>
        </div>
        <div style="position:absolute; right:25px; text-align:center;">
            <div class="live-dot"></div>
            <span style="color:#2ecc71; font-size:10px; font-weight:bold; display:block; margin-top:8px; letter-spacing:1px;">EN LIGNE</span>
        </div>
    </div>

    <section class="section-juridique">
        <h1>SÉCURITÉ JURIDIQUE</h1>
        <p>"Votre patrimoine en Algérie mérite la plus haute protection foncière."</p>
    </section>

    <div class="menu-grid">
        <a href="https://www.lkeria.com/vente-immobilier-professionnel" class="btn-action">
            <span>Immobilier Industriel</span>
            <i class="fas fa-industry"></i>
        </a>
        
        <a href="https://www.lkeria.com/vente-villa" class="btn-action">
            <span>Villas de Luxe</span>
            <i class="fas fa-gem"></i>
        </a>

        <a href="https://wa.me/33634089609" class="btn-action">
            <span>Visite Virtuelle Live</span>
            <i class="fas fa-video"></i>
        </a>

        <a href="#" class="btn-action btn-gold">
            <span>Paiement Frais de Dossier</span>
            <i class="fas fa-credit-card"></i>
        </a>
    </div>

    <div class="footer-sniper">SNIPER IMMOBILIER • EXCELLENCE • 2026</div>
    </body></html>
